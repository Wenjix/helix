<!DOCTYPE html>
<html>
<head>
<style>
  body { margin: 0; width: 1280px; height: 640px; background: #08090d; display: flex; align-items: center; justify-content: center; font-family: -apple-system, sans-serif; }
  .card { text-align: center; }
  .icon { font-size: 64px; margin-bottom: 16px; }
  .title { font-size: 56px; font-weight: 800; color: #f0a030; letter-spacing: -2px; }
  .sub { font-size: 24px; color: #b0b4c0; margin-top: 12px; max-width: 800px; }
  .stats { display: flex; gap: 40px; margin-top: 24px; justify-content: center; }
  .stat { text-align: center; }
  .stat-n { font-size: 32px; font-weight: 800; color: #4ade80; }
  .stat-l { font-size: 14px; color: #5a5e6a; margin-top: 4px; }
</style>
</head>
<body>
  <div class="card">
    <div class="icon">⚡</div>
    <div class="title">HELIX</div>
    <div class="sub">Self-healing infrastructure for AI agent payments</div>
    <div class="stats">
      <div class="stat"><div class="stat-n">90.3%</div><div class="stat-l">Recovery rate</div></div>
      <div class="stat"><div class="stat-n">314</div><div class="stat-l">Tests</div></div>
      <div class="stat"><div class="stat-n">&lt;1ms</div><div class="stat-l">Immune response</div></div>
      <div class="stat"><div class="stat-n">5</div><div class="stat-l">Platforms</div></div>
    </div>
  </div>
</body>
</html>
