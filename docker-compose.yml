version: '3.8'

services:
  helix:
    image: adrianhihi/helix-server:latest
    ports:
      - "7842:7842"
    environment:
      - HELIX_MODE=observe
      - HELIX_LLM_API_KEY=${HELIX_LLM_API_KEY:-}
      - HELIX_ADMIN_KEY=${HELIX_ADMIN_KEY:-}
    volumes:
      - helix-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7842/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  helix-data:
